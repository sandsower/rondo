# Worktrunk project config for Rondo.
# Keeps local task worktrees cheap while avoiding shared mutable build output.

[pre-start]
link-elixir-deps = """
set -eu
src="{{ repo_path }}/elixir/deps"
dst="elixir/deps"
if [ -L "$dst" ] && [ ! -e "$dst" ]; then
  rm "$dst"
fi
if [ -d "$src" ] && [ ! -e "$dst" ]; then
  ln -s "$src" "$dst"
  echo "linked $dst -> $src"
fi
"""

[step.copy-ignored]
exclude = [
  ".claude/",
  ".rondo_runs/",
  "elixir/_build/",
  "elixir/.claude/",
  "elixir/cover/",
  "elixir/deps/",
  "elixir/log/",
  "elixir/logs/",
  "elixir/tmp/",
]
